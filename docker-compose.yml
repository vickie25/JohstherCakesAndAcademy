# Local PostgreSQL for Johsther backend.
# Host port 5434 avoids clashing with another Postgres already on 5432.
# From repo root: docker compose up -d
# Set backend/.env: DB_PASSWORD=johsther_local, DB_PORT=5434 (host maps to 5432 in-container).

services:
  postgres:
    image: postgres:16-alpine
    container_name: johsther-postgres
    restart: unless-stopped
    ports:
      - "5434:5432"
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: johsther_local
      POSTGRES_DB: johsther_cakes_academy
    volumes:
      - johsther_pgdata:/var/lib/postgresql/data
      - ./docker/postgres/init:/docker-entrypoint-initdb.d:ro

volumes:
  johsther_pgdata:
